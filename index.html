<!DOCTYPE html>
<html>
<head>
  <title>Naughty Alliance</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-animation"></div>

<header>
  <h1>Naughty Alliance</h1>
</header>

<section class="hero">
  <h2>Members Only</h2>

  <div class="paywall" id="paywall">
    <p>Enter your email to unlock access</p>

    <form id="emailForm">
      <input type="email" id="email" placeholder="Enter your email" required>
      <button type="submit">Unlock</button>
    </form>
  </div>
</section>

<section class="models locked" id="models">
  <h2>Models</h2>

  <div class="cards">
    <a href="https://linktr.ee/Elderwivesgabii" target="_blank" class="card">
      <img src="https://via.placeholder.com/200x250">
      <span>Elderwivesgabi</span>
    </a>

    <a href="https://linktr.ee/Elderwiveschery" target="_blank" class="card">
      <img src="https://via.placeholder.com/200x250">
      <span>Elderwiveschery</span>
    </a>

    <a href="https://linktr.ee/Elderwivesakari" target="_blank" class="card">
      <img src="https://via.placeholder.com/200x250">
      <span>Elderwivesakari</span>
    </a>
  </div>
</section>

<script>
const form = document.getElementById("emailForm");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;

  fetch("https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "entry.YOUR_ENTRY_ID=" + email
  });

  document.getElementById("paywall").style.display = "none";
  document.getElementById("models").classList.remove("locked");

  setTimeout(() => {
    window.scrollTo({ top: document.getElementById("models").offsetTop, behavior: "smooth" });
  }, 300);
});
</script>

</body>
</html>
